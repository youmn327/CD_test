<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코딩테스트 대시보드</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Coding Test Dashboard</h1>
      <p>프로그래머스 Lv.0 - 풀이 현황</p>
    </div>

    <!-- 멤버 카드 -->
    <div class="cards" id="member-cards"></div>

    <!-- 풀이 현황 (탭 스위칭) -->
    <div class="section">
      <div class="tab-header">
        <div class="tab-buttons">
          <button class="tab-btn active" data-tab="monthly">월별</button>
          <button class="tab-btn" data-tab="daily">일별</button>
        </div>
        <div class="nav-controls">
          <!-- 월별 nav -->
          <div class="nav-group" id="nav-monthly">
            <button class="nav-btn" id="prev-year">&larr;</button>
            <span class="nav-label" id="current-year"></span>
            <button class="nav-btn" id="next-year">&rarr;</button>
          </div>
          <!-- 일별 nav -->
          <div class="nav-group" id="nav-daily" style="display:none;">
            <button class="nav-btn" id="prev-month">&larr;</button>
            <span class="nav-label" id="current-month-label"></span>
            <button class="nav-btn" id="next-month">&rarr;</button>
          </div>
        </div>
      </div>

      <!-- 월별 테이블 -->
      <div class="tab-content active" id="tab-monthly">
        <div class="month-table-wrap">
          <table class="month-table">
            <thead>
              <tr>
                <th>이름</th>
                <th>1월</th><th>2월</th><th>3월</th><th>4월</th>
                <th>5월</th><th>6월</th><th>7월</th><th>8월</th>
                <th>9월</th><th>10월</th><th>11월</th><th>12월</th>
                <th>합계</th>
              </tr>
            </thead>
            <tbody id="month-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- 일별 캘린더 -->
      <div class="tab-content" id="tab-daily">
        <div class="calendar-grid" id="calendar-grid"></div>
        <div class="cal-summary" id="cal-summary"></div>
      </div>
    </div>

    <!-- 최근 제출 -->
    <div class="section">
      <h2>최근 제출</h2>
      <div id="recent-list"></div>
    </div>

    <!-- 데이터 관리 -->
    <div class="section">
      <h2>데이터 관리</h2>
      <div class="btn-group">
        <button class="btn btn-secondary" id="btn-export-all">전체 JSON 내보내기</button>
        <label class="btn btn-secondary" style="cursor:pointer;">
          JSON 가져오기
          <input type="file" id="btn-import" accept=".json" style="display:none;">
        </label>
      </div>
      <div class="json-output" id="json-output"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script>
    let selectedYear = new Date().getFullYear();
    let selectedMonth = new Date().getMonth();
    let selectedDailyYear = new Date().getFullYear();

    init();

    function init() {
      renderMemberCards();
      renderMonthTable();
      renderCalendar();
      renderRecentSubmissions();

      document.getElementById('current-year').textContent = selectedYear;

      // 탭 스위칭
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
          document.getElementById('nav-monthly').style.display = btn.dataset.tab === 'monthly' ? '' : 'none';
          document.getElementById('nav-daily').style.display = btn.dataset.tab === 'daily' ? '' : 'none';
        });
      });

      // 월별 nav
      document.getElementById('prev-year').addEventListener('click', () => {
        selectedYear--;
        document.getElementById('current-year').textContent = selectedYear;
        renderMonthTable();
      });
      document.getElementById('next-year').addEventListener('click', () => {
        selectedYear++;
        document.getElementById('current-year').textContent = selectedYear;
        renderMonthTable();
      });

      // 일별 nav
      document.getElementById('prev-month').addEventListener('click', () => {
        selectedMonth--;
        if (selectedMonth < 0) { selectedMonth = 11; selectedDailyYear--; }
        renderCalendar();
      });
      document.getElementById('next-month').addEventListener('click', () => {
        selectedMonth++;
        if (selectedMonth > 11) { selectedMonth = 0; selectedDailyYear++; }
        renderCalendar();
      });

      document.getElementById('btn-export-all').addEventListener('click', exportAll);
      document.getElementById('btn-import').addEventListener('change', importData);
    }

    function renderMemberCards() {
      const container = document.getElementById('member-cards');
      const total = CONFIG.PROBLEMS.length;

      container.innerHTML = CONFIG.MEMBERS.map(member => {
        const solved = Storage.getByMember(member.id).length;
        const pct = Math.round((solved / total) * 100);
        return `
          <a href="${member.id}/index.html" style="text-decoration:none; color:inherit;">
            <div class="card">
              <div class="card-header">
                <div class="avatar" style="background:${member.color};">${member.name[0]}</div>
                <span class="card-title">${member.name}</span>
              </div>
              <div class="card-stat">${solved}<span style="font-size:16px; color:#8b949e;"> / ${total}</span></div>
              <div class="card-label">문제 풀이 완료 (${pct}%)</div>
              <div class="progress-bar">
                <div class="progress-fill" style="width:${pct}%; background:${member.color};"></div>
              </div>
            </div>
          </a>
        `;
      }).join('');
    }

    function renderMonthTable() {
      const tbody = document.getElementById('month-tbody');
      const summary = Storage.getMonthlySummary();

      tbody.innerHTML = CONFIG.MEMBERS.map(member => {
        const data = summary[member.id] || {};
        let yearTotal = 0;

        const cells = Array.from({ length: 12 }, (_, i) => {
          const key = `${selectedYear}-${String(i + 1).padStart(2, '0')}`;
          const count = data[key] || 0;
          yearTotal += count;
          return `<td><span class="cell-count ${count > 0 ? 'has-value' : ''}">${count || '-'}</span></td>`;
        }).join('');

        return `
          <tr>
            <td style="color:${member.color};">${member.name}</td>
            ${cells}
            <td class="total-col">${yearTotal}</td>
          </tr>
        `;
      }).join('');
    }

    function renderCalendar() {
      const m = selectedMonth + 1;
      document.getElementById('current-month-label').textContent = `${selectedDailyYear}년 ${m}월`;

      const grid = document.getElementById('calendar-grid');
      const daysInMonth = new Date(selectedDailyYear, m, 0).getDate();
      const firstDay = new Date(selectedDailyYear, selectedMonth, 1).getDay(); // 0=일
      const monthKey = `${selectedDailyYear}-${String(m).padStart(2, '0')}`;
      const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
      const today = new Date();

      // 일별 데이터 집계 (멤버별)
      const all = Storage.getAll();
      const dailyData = {}; // { day: { memberId: count } }
      all.forEach(s => {
        if (s.date.startsWith(monthKey)) {
          const day = parseInt(s.date.split('-')[2]);
          if (!dailyData[day]) dailyData[day] = {};
          dailyData[day][s.member] = (dailyData[day][s.member] || 0) + 1;
        }
      });

      let html = '';

      // 요일 헤더
      html += '<div class="cal-row cal-header">';
      dayNames.forEach((name, i) => {
        const cls = (i === 0 || i === 6) ? ' cal-weekend' : '';
        html += `<div class="cal-cell cal-day-name${cls}">${name}</div>`;
      });
      html += '</div>';

      // 날짜 셀
      let dayCount = 1;
      const totalWeeks = Math.ceil((firstDay + daysInMonth) / 7);

      for (let week = 0; week < totalWeeks; week++) {
        html += '<div class="cal-row">';
        for (let dow = 0; dow < 7; dow++) {
          const cellIndex = week * 7 + dow;
          if (cellIndex < firstDay || dayCount > daysInMonth) {
            html += '<div class="cal-cell cal-empty"></div>';
          } else {
            const d = dayCount;
            const isToday = selectedDailyYear === today.getFullYear() && selectedMonth === today.getMonth() && d === today.getDate();
            const isWeekend = dow === 0 || dow === 6;
            const data = dailyData[d] || {};
            const totalCount = Object.values(data).reduce((a, b) => a + b, 0);

            let cls = 'cal-cell cal-date';
            if (isToday) cls += ' cal-today';
            if (isWeekend) cls += ' cal-weekend';
            if (totalCount > 0) cls += ' cal-has-data';

            // 멤버별 뱃지
            let badges = '';
            CONFIG.MEMBERS.forEach(member => {
              const cnt = data[member.id] || 0;
              if (cnt > 0) {
                badges += `<span class="cal-badge" style="background:${member.color};">${member.name[0]} ${cnt}</span>`;
              }
            });

            html += `
              <div class="${cls}">
                <div class="cal-date-num${isWeekend ? ' cal-weekend-text' : ''}">${d}</div>
                <div class="cal-badges">${badges}</div>
              </div>
            `;
            dayCount++;
          }
        }
        html += '</div>';
      }

      grid.innerHTML = html;

      // 월간 멤버별 요약
      const summary = document.getElementById('cal-summary');
      const memberCounts = {};
      let grandTotal = 0;

      CONFIG.MEMBERS.forEach(member => { memberCounts[member.id] = 0; });
      all.forEach(s => {
        if (s.date.startsWith(monthKey)) {
          memberCounts[s.member] = (memberCounts[s.member] || 0) + 1;
          grandTotal++;
        }
      });

      // 활동 일수 계산
      const activeDays = {};
      CONFIG.MEMBERS.forEach(member => { activeDays[member.id] = new Set(); });
      all.forEach(s => {
        if (s.date.startsWith(monthKey)) {
          activeDays[s.member]?.add(s.date);
        }
      });

      summary.innerHTML = `
        <div class="cal-summary-title">${selectedDailyYear}년 ${m}월 요약</div>
        <div class="cal-summary-cards">
          ${CONFIG.MEMBERS.map(member => {
            const count = memberCounts[member.id];
            const days = activeDays[member.id].size;
            const avg = days > 0 ? (count / days).toFixed(1) : '0';
            return `
              <div class="cal-summary-card">
                <div class="cal-summary-avatar" style="background:${member.color};">${member.name[0]}</div>
                <div class="cal-summary-info">
                  <div class="cal-summary-name" style="color:${member.color};">${member.name}</div>
                  <div class="cal-summary-stat">${count}문제</div>
                  <div class="cal-summary-detail">${days}일 활동 &middot; 일평균 ${avg}문제</div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
        <div class="cal-summary-total">이번 달 전체: ${grandTotal}문제</div>
      `;
    }

    function renderRecentSubmissions() {
      const list = document.getElementById('recent-list');
      const all = Storage.getAll().reverse().slice(0, 10);

      if (all.length === 0) {
        list.innerHTML = '<div class="history-empty">아직 제출된 풀이가 없습니다.</div>';
        return;
      }

      list.innerHTML = all.map(s => {
        const member = CONFIG.MEMBERS.find(m => m.id === s.member);
        return `
          <div class="history-item">
            <div class="history-info">
              <div class="history-problem">
                <span style="color:${member?.color || '#8b949e'};">[${s.member}]</span>
                ${s.problemId} - ${s.problemName}
              </div>
              <div class="history-date">${s.date}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function exportAll() {
      const json = Storage.exportJSON();
      const el = document.getElementById('json-output');
      el.textContent = json;
      el.classList.toggle('show');

      if (el.classList.contains('show')) {
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'all_submissions.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast('JSON 파일이 다운로드됩니다.');
      }
    }

    function importData(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          Storage.importJSON(ev.target.result);
          showToast('데이터를 가져왔습니다!');
          renderMemberCards();
          renderMonthTable();
          renderCalendar();
          renderRecentSubmissions();
        } catch {
          showToast('잘못된 JSON 파일입니다.', 'error');
        }
      };
      reader.readAsText(file);
    }

    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast' + (type === 'error' ? ' error' : '');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
