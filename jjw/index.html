<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JJW - 코딩테스트 풀이 제출</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <a href="../index.html" class="back-link">&larr; 대시보드로 돌아가기</a>

    <div class="header">
      <div class="avatar" style="background:#58a6ff; width:56px; height:56px; font-size:24px; margin:0 auto 12px;">J</div>
      <h1>JJW</h1>
      <p>프로그래머스 Lv.0 풀이 제출</p>
    </div>

    <!-- 폴더 연결 -->
    <div class="section" id="folder-section">
      <h2>저장 폴더 연결</h2>
      <p style="color:#8b949e; font-size:14px; margin-bottom:12px;">
        제출 데이터를 저장할 폴더를 선택하세요. (브라우저 당 최초 1회)
      </p>
      <div class="btn-group">
        <button class="btn btn-primary" id="btn-connect-folder">폴더 선택</button>
      </div>
      <div class="folder-status" id="folder-status"></div>
    </div>

    <!-- 제출 폼 -->
    <div class="section">
      <h2>풀이 제출</h2>

      <div class="form-group">
        <label for="problem-select">문제 선택</label>
        <select id="problem-select">
          <option value="">-- 문제를 선택하세요 --</option>
        </select>
      </div>

      <div class="form-group">
        <label for="code-input">풀이 코드</label>
        <textarea id="code-input" class="code-textarea" placeholder="풀이 코드를 입력하세요..." spellcheck="false"></textarea>
      </div>

      <div class="form-group">
        <label for="image-input">스크린샷 첨부 (선택)</label>
        <div class="image-upload-area" id="image-upload-area">
          <input type="file" id="image-input" accept="image/*" style="display:none;">
          <div class="image-placeholder" id="image-placeholder" onclick="document.getElementById('image-input').click()">
            클릭, 드래그, 또는 Ctrl+V로 이미지를 붙여넣으세요
          </div>
          <div class="image-preview-wrap" id="image-preview-wrap" style="display:none;">
            <img id="image-preview" class="image-preview">
            <button class="btn btn-danger" onclick="clearImage()" style="margin-top:8px;">이미지 제거</button>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="submit-date">제출 날짜</label>
        <input type="text" id="submit-date" readonly>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="btn-submit">업로드</button>
        <button class="btn btn-secondary" id="btn-export">JSON 내보내기</button>
      </div>

      <div class="json-output" id="json-output"></div>
    </div>

    <!-- 제출 기록 -->
    <div class="section">
      <h2>제출 기록 (<span id="history-count">0</span>건)</h2>
      <div id="history-list"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/config.js"></script>
  <script src="../js/storage.js"></script>
  <script>
    const CURRENT_MEMBER = 'jjw';
    const FILE_NAME = 'submissions.json';
    let dirHandle = null;
    let imageBase64 = null;

    initPage();

    function initPage() {
      populateProblems();
      setTodayDate();
      setupImageUpload();
      loadFromFile().then(() => renderHistory());

      document.getElementById('btn-connect-folder').addEventListener('click', connectFolder);
      document.getElementById('btn-submit').addEventListener('click', handleSubmit);
      document.getElementById('btn-export').addEventListener('click', handleExport);
    }

    // === 이미지 업로드 ===
    function setupImageUpload() {
      const input = document.getElementById('image-input');
      const area = document.getElementById('image-upload-area');

      input.addEventListener('change', (e) => {
        if (e.target.files[0]) processImage(e.target.files[0]);
      });

      area.addEventListener('dragover', (e) => { e.preventDefault(); area.classList.add('drag-over'); });
      area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
      area.addEventListener('drop', (e) => {
        e.preventDefault();
        area.classList.remove('drag-over');
        if (e.dataTransfer.files[0]) processImage(e.dataTransfer.files[0]);
      });

      // Ctrl+V 붙여넣기
      document.addEventListener('paste', (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type.startsWith('image/')) {
            e.preventDefault();
            processImage(item.getAsFile());
            break;
          }
        }
      });
    }

    function processImage(file) {
      if (!file.type.startsWith('image/')) return showToast('이미지 파일만 가능합니다.', 'error');
      const reader = new FileReader();
      reader.onload = (e) => {
        imageBase64 = e.target.result;
        document.getElementById('image-preview').src = imageBase64;
        document.getElementById('image-preview-wrap').style.display = 'block';
        document.getElementById('image-placeholder').style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    function clearImage() {
      imageBase64 = null;
      document.getElementById('image-input').value = '';
      document.getElementById('image-preview-wrap').style.display = 'none';
      document.getElementById('image-placeholder').style.display = 'block';
    }

    // === File System Access API ===
    async function connectFolder() {
      try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        updateFolderStatus(true);
        showToast('폴더가 연결되었습니다!');
        await loadFromFile();
        renderHistory();
      } catch (e) {
        if (e.name !== 'AbortError') showToast('폴더 연결에 실패했습니다.', 'error');
      }
    }

    function updateFolderStatus(connected) {
      const el = document.getElementById('folder-status');
      if (connected) {
        el.innerHTML = `<span style="color:#7ee787;">&#10003; 폴더 연결됨: ${dirHandle.name}/</span>`;
      } else {
        el.innerHTML = '<span style="color:#8b949e;">연결된 폴더 없음</span>';
      }
    }

    async function readFileFromDir() {
      if (!dirHandle) return null;
      try {
        const fileHandle = await dirHandle.getFileHandle(FILE_NAME);
        const file = await fileHandle.getFile();
        const text = await file.text();
        return JSON.parse(text);
      } catch {
        return []; // 파일이 없으면 빈 배열
      }
    }

    async function writeFileToDir(data) {
      if (!dirHandle) return false;
      try {
        const fileHandle = await dirHandle.getFileHandle(FILE_NAME, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(JSON.stringify(data, null, 2));
        await writable.close();
        return true;
      } catch (e) {
        showToast('파일 저장 실패: ' + e.message, 'error');
        return false;
      }
    }

    async function loadFromFile() {
      if (!dirHandle) return;
      const data = await readFileFromDir();
      if (data && data.length > 0) {
        // 파일 데이터를 localStorage에 동기화
        const existing = Storage.getAll();
        const existingKeys = new Set(existing.map(s => `${s.member}-${s.problemId}-${s.date}`));
        let added = 0;
        data.forEach(s => {
          const key = `${s.member}-${s.problemId}-${s.date}`;
          if (!existingKeys.has(key)) {
            Storage.add(s);
            added++;
          }
        });
        if (added > 0) showToast(`파일에서 ${added}건 불러옴`);
      }
      // 드롭다운 갱신
      refreshDropdown();
    }

    // === 제출 처리 ===
    async function handleSubmit() {
      const problemId = document.getElementById('problem-select').value;
      const code = document.getElementById('code-input').value.trim();
      const date = document.getElementById('submit-date').dataset.iso;

      if (!problemId) return showToast('문제를 선택하세요.', 'error');
      if (!code) return showToast('코드를 입력하세요.', 'error');

      const problem = CONFIG.PROBLEMS.find(p => p.id === problemId);

      const submission = {
        member: CURRENT_MEMBER,
        problemId: problem.id,
        problemName: problem.name,
        code: code,
        date: date,
        image: imageBase64 || null,
      };

      // localStorage 저장
      Storage.add(submission);
      clearImage();

      // 폴더에 파일 저장
      if (dirHandle) {
        const all = Storage.getByMember(CURRENT_MEMBER);
        const saved = await writeFileToDir(all);
        if (saved) {
          showToast(`${problem.name} 제출 완료! 파일에 저장됨`);
        }
      } else {
        showToast(`${problem.name} 제출 완료! (폴더 미연결 - localStorage에만 저장)`);
      }

      document.getElementById('code-input').value = '';
      document.getElementById('problem-select').value = '';
      refreshDropdown();
      renderHistory();
    }

    function handleExport() {
      const submissions = Storage.getByMember(CURRENT_MEMBER);
      const json = JSON.stringify(submissions, null, 2);
      const el = document.getElementById('json-output');
      el.textContent = json;
      el.classList.toggle('show');

      if (el.classList.contains('show')) {
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${CURRENT_MEMBER}_submissions.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('JSON 파일이 다운로드됩니다.');
      }
    }

    // === UI ===
    function populateProblems() {
      const select = document.getElementById('problem-select');
      CONFIG.PROBLEMS.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        const done = Storage.isSubmitted(CURRENT_MEMBER, p.id);
        opt.textContent = `${done ? '\u2713 ' : ''}${p.id} - ${p.name} (${p.rate}%)`;
        if (done) opt.style.color = '#7ee787';
        select.appendChild(opt);
      });
    }

    function refreshDropdown() {
      const select = document.getElementById('problem-select');
      select.innerHTML = '<option value="">-- 문제를 선택하세요 --</option>';
      populateProblems();
    }

    function setTodayDate() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      document.getElementById('submit-date').value = `${y}-${m}-${d} (${days[now.getDay()]}요일)`;
      document.getElementById('submit-date').dataset.iso = `${y}-${m}-${d}`;
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      const submissions = Storage.getByMember(CURRENT_MEMBER).reverse();
      document.getElementById('history-count').textContent = submissions.length;

      if (submissions.length === 0) {
        list.innerHTML = '<div class="history-empty">아직 제출한 풀이가 없습니다.</div>';
        return;
      }

      list.innerHTML = submissions.map(s => `
        <div class="history-entry">
          <div class="history-item" onclick="toggleCode('${s.timestamp}')">
            <div class="history-info">
              <div class="history-problem">
                ${s.image ? '<span class="badge-img">IMG</span> ' : ''}${s.problemId} - ${s.problemName}
              </div>
              <div class="history-date">${s.date}</div>
            </div>
            <div class="history-actions">
              <span class="history-toggle" id="toggle-${s.timestamp}">&#9654;</span>
              <button class="btn btn-danger" onclick="event.stopPropagation(); removeSubmission('${s.timestamp}')">삭제</button>
            </div>
          </div>
          <div class="history-detail" id="code-${s.timestamp}">
            <pre class="history-code-block">${escapeHtml(s.code)}</pre>
            ${s.image ? `<img src="${s.image}" class="history-image" onclick="openImageModal(this.src)">` : ''}
          </div>
        </div>
      `).join('');
    }

    function toggleCode(timestamp) {
      const detail = document.getElementById('code-' + timestamp);
      const toggle = document.getElementById('toggle-' + timestamp);
      const isOpen = detail.classList.toggle('show');
      toggle.innerHTML = isOpen ? '&#9660;' : '&#9654;';
    }

    function openImageModal(src) {
      const modal = document.createElement('div');
      modal.className = 'image-modal';
      modal.innerHTML = `<img src="${src}"><div class="image-modal-close" onclick="this.parentElement.remove()">&#10005;</div>`;
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
      document.body.appendChild(modal);
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function removeSubmission(timestamp) {
      Storage.remove(timestamp);
      if (dirHandle) {
        const all = Storage.getByMember(CURRENT_MEMBER);
        await writeFileToDir(all);
      }
      refreshDropdown();
      renderHistory();
      showToast('삭제되었습니다.');
    }

    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast' + (type === 'error' ? ' error' : '');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
